<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Good Morning</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #fff3c4, #ffb8c6);
      color: #472d3c;
    }

    main {
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 5rem);
    }

    p {
      margin: 18px 0 0;
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main>
    <h1>Good morning to you, beautiful! ☀️</h1>
    <p>Now go splash some cool water on your face—and start your day.</p>
  </main>
</body>
</html>
